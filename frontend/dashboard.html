<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JurisAI - Dashboard Operacional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        :root {
            --bg-dark: #070a0e;
            --bg-side: #0b0f17;
            --bg-card: #12161f;
            --gold: #c9a84c;
            --text-light: #e6edf3;
            --text-muted: #8b949e;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-side);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .sidebar .brand {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            color: var(--text-muted);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu-item:hover, .menu-item.active {
            background: var(--bg-card);
            color: var(--gold);
        }
        .logout {
            margin-top: auto;
            color: #ef4444;
        }

        /* Main Workspace */
        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }
        .profile-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-card);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: var(--radius);
        }
        .stat-card h4 { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem;}
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #fff; }
        .stat-card .value.gold-text { color: var(--gold); }

        /* Dynamic Panel Layout */
        .workspace-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
        }
        .workspace-box h3 { margin-bottom: 1.5rem; font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }

        .tag {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .tag.lawyer { background: rgba(201, 168, 76, 0.2); color: var(--gold); }
        .tag.client { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand"><i class="fas fa-balance-scale"></i> JurisAI</div>
    <div class="menu-item active"><i class="fas fa-chart-pie"></i> Visão Geral</div>
    <div class="menu-item"><i class="fas fa-folder-open"></i> Processos & Casos</div>
    <div class="menu-item"><i class="fas fa-robot"></i> Central de Agentes IA</div>
    <div class="menu-item"><i class="fas fa-cog"></i> Configurações</div>
    <div class="menu-item logout" onclick="window.location.href='/frontend/index.html'"><i class="fas fa-sign-out-alt"></i> Sair do Sistema</div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div>
            <h2>Bem-vindo de volta ao Sistema</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 0.2rem;">Infraestrutura operacional e logs em tempo real.</p>
        </div>
        <div class="profile-badge">
            <i class="fas fa-user-circle" style="color: var(--gold);"></i>
            <span id="userDisplay">Sessão Ativa</span>
            <span class="tag" id="roleTag">...</span>
        </div>
    </div>

    <div class="stats-grid" id="metricsGrid">
        </div>

    <div class="workspace-box" id="dynamicWorkspace">
        </div>
</div>

<script>
    // Recupera dados salvos da autenticação local
    const email = localStorage.getItem('userEmail') || 'teamspancerski@gmail.com';
    const role = localStorage.getItem('userRole') || 'lawyer';

    document.getElementById('userDisplay').innerText = email;
    const roleTag = document.getElementById('roleTag');
    roleTag.innerText = role === 'lawyer' ? 'Advogado' : 'Cliente';
    roleTag.className = `tag ${role}`;

    const metricsGrid = document.getElementById('metricsGrid');
    const workspace = document.getElementById('dynamicWorkspace');

    if(role === 'lawyer') {
        // Layout Completo para Advogados
        metricsGrid.innerHTML = `
            <div class="stat-card"><h4>Casos Sob Análise da IA</h4><div class="value gold-text">14</div></div>
            <div class="stat-card"><h4>Petições Geradas Hoje</h4><div class="value">38</div></div>
            <div class="stat-card"><h4>Consultas no Chatbot</h4><div class="value">142</div></div>
            <div class="stat-card"><h4>Precisão Média das Minutas</h4><div class="value" style="color: #25d366;">98.4%</div></div>
        `;
        workspace.innerHTML = `
            <h3>Painel de Controle Jurídico (Visão do Advogado)</h3>
            <p style="margin-bottom: 1.5rem; color: var(--text-muted);">Abaixo estão listadas as triagens recentes executadas pelo Agente Autônomo conectado ao seu banco de dados local:</p>
            <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem;">
                <thead>
                    <tr style="border-bottom: 2px solid var(--border); color: var(--gold);">
                        <th style="padding: 0.8rem;">ID</th>
                        <th>Cliente Solicitante</th>
                        <th>Tipo de Petição</th>
                        <th>Urgência Estimada</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="border-bottom: 1px solid var(--border);">
                        <td style="padding: 0.8rem; color: var(--text-muted);">#0921</td>
                        <td>Carlos Eduardo M.</td>
                        <td>Ação de Cobrança / Contratos</td>
                        <td><span style="color: #ef4444; font-weight: bold;">ALTA</span></td>
                        <td><button style="background: var(--gold); color: #000; border: none; padding: 0.3rem 0.6rem; border-radius: 4px; font-weight: bold; cursor: pointer;">Visualizar Petição</button></td>
                    </tr>
                    <tr style="border-bottom: 1px solid var(--border);">
                        <td style="padding: 0.8rem; color: var(--text-muted);">#0877</td>
                        <td>Mariana Costa Lima</td>
                        <td>Revisão Contratual Imobiliária</td>
                        <td style="color: var(--gold);">Média</td>
                        <td><button style="background: var(--gold); color: #000; border: none; padding: 0.3rem 0.6rem; border-radius: 4px; font-weight: bold; cursor: pointer;">Visualizar Petição</button></td>
                    </tr>
                </tbody>
            </table>
        `;
    } else {
        // Layout Completo para Clientes
        metricsGrid.innerHTML = `
            <div class="stat-card"><h4>Seus Processos Ativos</h4><div class="value gold-text">1</div></div>
            <div class="stat-card"><h4>Interações com a IA</h4><div class="value">8</div></div>
            <div class="stat-card"><h4>Documentos Assinados</h4><div class="value" style="color: #25d366;">3</div></div>
        `;
        workspace.innerHTML = `
            <h3>Portal do Cliente JurisAI</h3>
            <p style="margin-bottom: 1.5rem; color: var(--text-muted);">Acompanhe o andamento das suas solicitações e utilize nosso Agente Virtual 24 horas:</p>
            <div style="background: var(--bg-dark); border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
                <h5 style="color: var(--gold); margin-bottom: 0.5rem;"><i class="fas fa-robot"></i> Conversar com o Assistente Jurídico</h5>
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem;">Seu caso está sendo supervisionado. Tire dúvidas ou anexe novos fatos abaixo.</p>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" class="form-control" style="background: #161b22;" placeholder="Digite sua pergunta para a Inteligência Artificial...">
                    <button style="background: var(--gold); color: #000; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer;">Enviar</button>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
