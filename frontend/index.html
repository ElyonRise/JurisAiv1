<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JurisAI – Escritório de Advocacia Inteligente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        :root {
            --bg-dark: #070a0e;
            --bg-card: #12161f;
            --bg-input: #1a202c;
            --gold: #c9a84c;
            --gold-hover: #e1c96b;
            --text-light: #e6edf3;
            --text-muted: #8b949e;
            --radius: 12px;
            --shadow: 0 8px 24px rgba(0,0,0,0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: auto;
            padding: 2rem 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header img {
            max-width: 120px;
            margin-bottom: 1rem;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }
        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .type-tabs {
            display: flex;
            background: var(--bg-card);
            padding: 4px;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: calc(var(--radius) - 2px);
            transition: all 0.25s ease;
        }
        .tab-btn.active {
            background: var(--gold);
            color: var(--bg-dark);
        }

        .form-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 2rem 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }
        .form-control {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem 0.75rem 2.7rem;
            color: #fff;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.2);
        }
        select.form-control {
            appearance: none;
            cursor: pointer;
        }

        .btn-primary {
            width: 100%;
            background: var(--gold);
            color: var(--bg-dark);
            border: none;
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .btn-primary:hover {
            background: var(--gold-hover);
        }
        .btn-primary:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .success-banner {
            display: none;
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid var(--gold);
            border-radius: var(--radius);
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .success-banner.show {
            display: block;
        }
        .success-banner i {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }
        .success-banner h2 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .success-banner p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            border: 1px solid var(--border);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { border-color: #10b981; }
        .toast.error { border-color: #ef4444; }

        .lawyer-only { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>JurisAI</h1>
            <p>Plataforma de Advocacia Inteligente</p>
        </div>

        <div class="type-tabs">
            <button class="tab-btn active" onclick="switchType('client')">Cliente</button>
            <button class="tab-btn" onclick="switchType('lawyer')">Advogado</button>
        </div>

        <div id="successBanner" class="success-banner">
            <i class="fas fa-check-circle"></i>
            <h2>Cadastro Realizado!</h2>
            <p id="successMsg"></p>
        </div>

        <form id="regForm" class="form-card" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="nome" class="form-control" placeholder="Ex: João Silva" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">E-mail Corporativo</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="Ex: joao@empresa.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="senha">Senha de Acesso</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-group lawyer-only">
                <label for="oab">Inscrição OAB</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="oab" class="form-control" placeholder="Ex: 123456">
                </div>
            </div>

            <div class="form-group lawyer-only">
                <label for="seccional">Seccional UF</label>
                <div class="input-wrapper">
                    <i class="fas fa-map-marker-alt"></i>
                    <select id="seccional" class="form-control">
                        <option value="">Selecione...</option>
                        <option value="SP">São Paulo (SP)</option>
                        <option value="RJ">Rio de Janeiro (RJ)</option>
                        <option value="MG">Minas Gerais (MG)</option>
                        <option value="SC">Santa Catarina (SC)</option>
                        <option value="RS">Rio Grande do Sul (RS)</option>
                    </select>
                </div>
            </div>

            <div class="form-group lawyer-only">
                <label for="especializacao">Especialidade Principal</label>
                <div class="input-wrapper">
                    <i class="fas fa-gavel"></i>
                    <input type="text" id="especializacao" class="form-control" placeholder="Ex: Direito Civil">
                </div>
            </div>

            <div class="form-group lawyer-only">
                <label for="experiencia">Anos de Experiência</label>
                <div class="input-wrapper">
                    <i class="fas fa-briefcase"></i>
                    <input type="number" id="experiencia" class="form-control" placeholder="Ex: 5" min="0">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn-primary">
                <i class="fas fa-user-plus" style="margin-right:.5rem"></i>Criar conta
            </button>
        </form>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Configuração direta apontando para o seu backend no Render
        const API = "https://jurisai-backend-i0zq.onrender.com";
        let currentType = 'client';

        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const lawyerFields = document.querySelectorAll('.lawyer-only');
            if(type === 'lawyer') {
                lawyerFields.forEach(f => f.style.display = 'block');
                document.getElementById('oab').required = true;
                document.getElementById('seccional').required = true;
            } else {
                lawyerFields.forEach(f => f.style.display = 'none');
                document.getElementById('oab').required = false;
                document.getElementById('seccional').required = false;
            }
        }

        function showToast(msg, type='') {
            const t = document.getElementById('toast');
            t.className = `toast show ${type}`;
            t.innerHTML = type === 'success' 
                ? `<i class="fas fa-check-circle" style="color:#10b981"></i> ${msg}`
                : `<i class="fas fa-exclamation-circle" style="color:#ef4444"></i> ${msg}`;
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        async function handleSubmit(e) {
            e.preventDefault();
            
            const name = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('senha').value;

            const payload = {
                full_name: name,
                email: email,
                password: password,
                role: currentType
            };

            if (currentType === 'lawyer') {
                payload.oab_number = document.getElementById('oab').value.trim();
                payload.oab_seccional = document.getElementById('seccional').value;
                payload.especializacao = document.getElementById('especializacao').value.trim();
                payload.experiencia = parseInt(document.getElementById('experiencia').value) || 0;
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:.5rem"></i>Aguarde...';

            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('regForm').style.display = 'none';
                    document.querySelector('.type-tabs').style.display = 'none';
                    const banner = document.getElementById('successBanner');
                    document.getElementById('successMsg').textContent = `Enviamos um link de ativação para ${email}. Verifique sua caixa de entrada.`;
                    banner.classList.add('show');
                    showToast('Conta criada! Verifique seu e-mail.', 'success');
                } else {
                    showToast(data.detail || 'Erro ao criar conta.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:.5rem"></i>Criar conta';
                }
            } catch (err) {
                showToast('Não foi possível conectar ao servidor.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:.5rem"></i>Criar conta';
            }
        }
    </script>
</body>
</html>
