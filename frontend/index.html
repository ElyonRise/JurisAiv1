<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JurisAI – Plataforma de Advocacia Inteligente</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <style>

        :root {
            --bg: #06080c;
            --surface: #0e1118;
            --surface2: #151b26;
            --surface3: #1c2535;
            --gold: #c9a84c;
            --gold2: #e8c97a;
            --gold-dim: rgba(201,168,76,0.12);
            --gold-glow: rgba(201,168,76,0.25);
            --text: #edf2f7;
            --text2: #a0aec0;
            --text3: #5a6478;
            --border: rgba(255,255,255,0.07);
            --border-gold: rgba(201,168,76,0.3);
            --danger: #e05252;
            --success: #4caf82;
            --r: 14px;
            --r-sm: 8px;
            --shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .wrapper {
            width:100%;
            max-width:480px;
            padding:1rem;
        }

        .card {
            background: var(--surface);
            border:1px solid var(--border);
            border-radius:var(--r);
            overflow:hidden;
        }

        .nav-tabs {
            display:flex;
            border-bottom:1px solid var(--border);
        }

        .nav-tab {
            flex:1;
            background:none;
            border:none;
            color:var(--text3);
            padding:1rem;
            cursor:pointer;
            font-weight:bold;
        }

        .nav-tab.active {
            color:var(--gold);
            border-bottom:2px solid var(--gold);
        }

        .panel {
            display:none;
            padding:2rem;
        }

        .panel.active {
            display:block;
        }

        .role-row {
            display:flex;
            gap:.5rem;
            margin-bottom:1.5rem;
        }

        .role-btn {
            flex:1;
            border:none;
            padding:.7rem;
            cursor:pointer;
            border-radius:8px;
            background:var(--surface2);
            color:var(--text2);
        }

        .role-btn.active {
            background:var(--gold);
            color:#000;
        }

        .form-group {
            margin-bottom:1rem;
        }

        .form-group label {
            display:block;
            margin-bottom:.4rem;
            color:var(--text2);
        }

        .field {
            position:relative;
        }

        .field input,
        .field select {
            width:100%;
            background:var(--surface2);
            border:1px solid var(--border);
            color:white;
            padding:.85rem;
            border-radius:8px;
        }

        .btn {
            width:100%;
            padding:.9rem;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
            margin-top:1rem;
        }

        .btn-gold {
            background:var(--gold);
            color:black;
        }

        .lawyer-field {
            display:none;
        }

        .toast {
            position:fixed;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            background:#111;
            color:#fff;
            padding:1rem 1.5rem;
            border-radius:10px;
            display:none;
            z-index:9999;
        }

        .toast.show {
            display:block;
        }

    </style>
</head>

<body>

<div class="wrapper">

    <div class="card">

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showPanel('login')">
                Entrar
            </button>

            <button class="nav-tab" onclick="showPanel('register')">
                Cadastrar
            </button>

            <button class="nav-tab" onclick="showPanel('reset')">
                Recuperar
            </button>
        </div>

        <!-- LOGIN -->
        <div class="panel active" id="panel-login">

            <div class="role-row">
                <button class="role-btn active"
                        onclick="setRole('login','client',this)">
                    Cliente
                </button>

                <button class="role-btn"
                        onclick="setRole('login','lawyer',this)">
                    Advogado
                </button>
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <div class="field">
                    <input type="email" id="login-email">
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="field">
                    <input type="password" id="login-senha">
                </div>
            </div>

            <button class="btn btn-gold"
                    id="btn-login"
                    onclick="handleLogin()">
                Entrar
            </button>

        </div>

        <!-- REGISTER -->
        <div class="panel" id="panel-register">

            <div class="role-row">

                <button class="role-btn active"
                        onclick="setRole('reg','client',this)">
                    Cliente
                </button>

                <button class="role-btn"
                        onclick="setRole('reg','lawyer',this)">
                    Advogado
                </button>

            </div>

            <div class="form-group">
                <label>Nome Completo</label>
                <div class="field">
                    <input type="text" id="reg-nome">
                </div>
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <div class="field">
                    <input type="email" id="reg-email">
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="field">
                    <input type="password" id="reg-senha">
                </div>
            </div>

            <!-- Lawyer -->

            <div class="lawyer-field form-group">
                <label>OAB</label>
                <div class="field">
                    <input type="text" id="reg-oab">
                </div>
            </div>

            <div class="lawyer-field form-group">
                <label>Seccional</label>
                <div class="field">
                    <select id="reg-seccional">
                        <option value="">Selecione</option>
                        <option value="SP">SP</option>
                        <option value="RJ">RJ</option>
                        <option value="MG">MG</option>
                    </select>
                </div>
            </div>

            <div class="lawyer-field form-group">
                <label>Especialização</label>
                <div class="field">
                    <input type="text" id="reg-spec">
                </div>
            </div>

            <div class="lawyer-field form-group">
                <label>Experiência</label>
                <div class="field">
                    <input type="number" id="reg-exp">
                </div>
            </div>

            <button class="btn btn-gold"
                    id="btn-register"
                    onclick="handleRegister()">
                Criar Conta
            </button>

        </div>

        <!-- RESET -->
        <div class="panel" id="panel-reset">

            <div class="form-group">
                <label>E-mail</label>

                <div class="field">
                    <input type="email" id="reset-email">
                </div>
            </div>

            <button class="btn btn-gold"
                    onclick="handleReset()">
                Recuperar Senha
            </button>

        </div>

    </div>

</div>

<div class="toast" id="toast">
    <span id="toast-msg"></span>
</div>

<script>

const API = "https://jurisai-backend-i0zq.onrender.com";

let loginRole = "client";
let regRole   = "client";

/* NAVIGATION */

function showPanel(name) {

    document.querySelectorAll('.panel')
        .forEach(p => p.classList.remove('active'));

    document.querySelectorAll('.nav-tab')
        .forEach(t => t.classList.remove('active'));

    document.getElementById('panel-' + name)
        .classList.add('active');

    const tabs = document.querySelectorAll('.nav-tab');

    const map = {
        login:0,
        register:1,
        reset:2
    };

    tabs[map[name]].classList.add('active');
}

/* ROLE */

function setRole(panel, role, btn) {

    if (panel === 'login') {
        loginRole = role;
    } else {
        regRole = role;
    }

    btn.closest('.role-row')
        .querySelectorAll('.role-btn')
        .forEach(b => b.classList.remove('active'));

    btn.classList.add('active');

    if (panel === 'reg') {

        const isLawyer = role === 'lawyer';

        document.querySelectorAll('.lawyer-field')
            .forEach(el => {
                el.style.display = isLawyer ? 'block' : 'none';
            });
    }
}

/* TOAST */

function toast(msg) {

    const el = document.getElementById('toast');

    document.getElementById('toast-msg').textContent = msg;

    el.classList.add('show');

    setTimeout(() => {
        el.classList.remove('show');
    }, 4000);
}

/* ERROR PARSER */

function parseError(error) {

    console.error(error);

    if (!error) {
        return "Erro desconhecido";
    }

    if (typeof error === "string") {
        return error;
    }

    if (Array.isArray(error.detail)) {

        return error.detail.map(e => {

            const field = e.loc
                ? e.loc.join(" → ")
                : "campo";

            return `${field}: ${e.msg}`;

        }).join("\n");
    }

    if (typeof error.detail === "string") {
        return error.detail;
    }

    if (typeof error.message === "string") {
        return error.message;
    }

    return JSON.stringify(error);
}

/* LOGIN */

async function handleLogin() {

    const email = document.getElementById('login-email').value.trim();

    const password = document.getElementById('login-senha').value;

    if (!email || !password) {
        toast("Preencha todos os campos");
        return;
    }

    try {

        const payload = {
            email,
            password,
            role: loginRole
        };

        console.log(payload);

        const res = await fetch(`${API}/login`, {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        });

        const data = await res.json();

        console.log(data);

        if (!res.ok) {
            toast(parseError(data));
            return;
        }

        toast("Login realizado!");

    } catch (err) {

        console.error(err);

        toast("Erro de conexão");
    }
}

/* REGISTER */

async function handleRegister() {

    const name = document.getElementById('reg-nome').value.trim();

    const email = document.getElementById('reg-email').value.trim();

    const password = document.getElementById('reg-senha').value;

    if (!name || !email || !password) {
        toast("Preencha todos os campos");
        return;
    }

    const payload = {
        full_name: name,
        email,
        password,
        role: regRole
    };

    if (regRole === 'lawyer') {

        payload.oab_number =
            document.getElementById('reg-oab').value.trim();

        payload.oab_seccional =
            document.getElementById('reg-seccional').value;

        payload.especializacao =
            document.getElementById('reg-spec').value.trim();

        payload.experiencia =
            parseInt(document.getElementById('reg-exp').value) || 0;
    }

    console.log("REGISTER:", payload);

    try {

        const res = await fetch(`${API}/register`, {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        });

        let data = {};

        try {
            data = await res.json();
        } catch {}

        console.log(data);

        if (!res.ok) {
            toast(parseError(data));
            return;
        }

        toast("Conta criada com sucesso!");

    } catch (err) {

        console.error(err);

        toast("Erro de conexão");
    }
}

/* RESET */

async function handleReset() {

    const email =
        document.getElementById('reset-email').value.trim();

    if (!email) {
        toast("Informe seu e-mail");
        return;
    }

    try {

        await fetch(`${API}/forgot-password`, {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({ email })
        });

        toast("Verifique sua caixa de entrada");

    } catch (err) {

        console.error(err);

        toast("Erro de conexão");
    }
}

</script>

</body>
</html>
