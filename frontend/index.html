<script>
const API = "https://jurisai-backend-i0zq.onrender.com";

let loginRole = 'client';
let regRole   = 'client';

/* ─────────────────────────────
   PANEL NAVIGATION
───────────────────────────── */
function showPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

    document.getElementById('panel-' + name).classList.add('active');

    const tabs = document.querySelectorAll('.nav-tab');
    const map = { login:0, register:1, reset:2 };
    tabs[map[name]].classList.add('active');
}

/* ─────────────────────────────
   ROLE SWITCHER
───────────────────────────── */
function setRole(panel, role, btn) {

    if (panel === 'login') {
        loginRole = role;
    } else {
        regRole = role;
    }

    btn.closest('.role-row')
       .querySelectorAll('.role-btn')
       .forEach(b => b.classList.remove('active'));

    btn.classList.add('active');

    if (panel === 'reg') {

        const isLawyer = role === 'lawyer';

        document.querySelectorAll('.lawyer-field').forEach(el => {
            el.style.display = isLawyer ? 'block' : 'none';
        });

        document.getElementById('reg-oab').required = isLawyer;
        document.getElementById('reg-seccional').required = isLawyer;
    }
}

/* ─────────────────────────────
   PASSWORD TOGGLE
───────────────────────────── */
function togglePwd(id, btn) {

    const input = document.getElementById(id);
    const icon  = btn.querySelector('i');

    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}

/* ─────────────────────────────
   SAFE ERROR PARSER
───────────────────────────── */
function parseError(error) {

    console.error("BACKEND ERROR:", error);

    if (!error) {
        return "Erro desconhecido.";
    }

    if (typeof error === "string") {
        return error;
    }

    if (Array.isArray(error.detail)) {

        return error.detail.map(e => {

            const field = e.loc
                ? e.loc.join(" → ")
                : "campo";

            return `${field}: ${e.msg}`;

        }).join("\n");
    }

    if (typeof error.detail === "string") {
        return error.detail;
    }

    if (typeof error.message === "string") {
        return error.message;
    }

    return JSON.stringify(error, null, 2);
}

/* ─────────────────────────────
   TOAST
───────────────────────────── */
function toast(msg, type = '') {

    const el = document.getElementById('toast');
    const icon = el.querySelector('i');
    const span = document.getElementById('toast-msg');

    span.textContent = msg;

    el.className = `toast show ${type}`;

    icon.className =
        type === 'success'
            ? 'fas fa-check-circle'
            : type === 'error'
                ? 'fas fa-exclamation-circle'
                : 'fas fa-circle-info';

    clearTimeout(el._timer);

    el._timer = setTimeout(() => {
        el.classList.remove('show');
    }, 4500);
}

/* ─────────────────────────────
   BUTTON STATE
───────────────────────────── */
function btnLoad(id, loading, label, icon) {

    const btn = document.getElementById(id);

    btn.disabled = loading;

    btn.innerHTML = loading
        ? `<i class="fas fa-spinner fa-spin"></i> Aguarde...`
        : `<i class="${icon}"></i> ${label}`;
}

/* ─────────────────────────────
   LOGIN
───────────────────────────── */
async function handleLogin() {

    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-senha').value;

    if (!email || !password) {
        toast('Preencha todos os campos.', 'error');
        return;
    }

    btnLoad('btn-login', true);

    try {

        const payload = {
            email,
            password,
            role: loginRole
        };

        console.log("LOGIN PAYLOAD:", payload);

        const res = await fetch(`${API}/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        let data = {};

        try {
            data = await res.json();
        } catch (e) {
            console.error("JSON LOGIN ERROR:", e);
        }

        console.log("LOGIN STATUS:", res.status);
        console.log("LOGIN RESPONSE:", data);

        if (!res.ok) {
            toast(parseError(data), 'error');
            return;
        }

        if (data.access_token) {
            localStorage.setItem('jurisai_token', data.access_token);
        }

        document.getElementById('login-form').style.display = 'none';

        document.getElementById('login-success-msg').textContent =
            'Bem-vindo de volta!';

        document.getElementById('login-success').classList.add('show');

        toast('Login realizado com sucesso!', 'success');

    } catch (err) {

        console.error(err);

        toast('Erro de conexão com servidor.', 'error');

    }

    btnLoad(
        'btn-login',
        false,
        'Entrar na plataforma',
        'fas fa-arrow-right-to-bracket'
    );
}

/* ─────────────────────────────
   REGISTER
───────────────────────────── */
async function handleRegister() {

    const name     = document.getElementById('reg-nome').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-senha').value;

    if (!name || !email || !password) {
        toast('Preencha nome, e-mail e senha.', 'error');
        return;
    }

    if (password.length < 8) {
        toast('A senha deve ter ao menos 8 caracteres.', 'error');
        return;
    }

    const payload = {
        full_name: name,
        email,
        password,
        role: regRole
    };

    if (regRole === 'lawyer') {

        const oab = document.getElementById('reg-oab').value.trim();
        const sec = document.getElementById('reg-seccional').value;

        if (!oab || !sec) {
            toast('Informe OAB e seccional.', 'error');
            return;
        }

        payload.oab_number = oab;
        payload.oab_seccional = sec;
        payload.especializacao =
            document.getElementById('reg-spec').value.trim();

        payload.experiencia =
            parseInt(document.getElementById('reg-exp').value) || 0;
    }

    console.log("REGISTER PAYLOAD:", payload);

    btnLoad('btn-register', true);

    try {

        const res = await fetch(`${API}/register`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        let data = {};

        try {
            data = await res.json();
        } catch (e) {
            console.error("REGISTER JSON ERROR:", e);
        }

        console.log("REGISTER STATUS:", res.status);
        console.log("REGISTER RESPONSE:", data);

        if (!res.ok) {
            toast(parseError(data), 'error');
            return;
        }

        document.getElementById('reg-form').style.display = 'none';

        document.getElementById('reg-success-msg').textContent =
            `Conta criada para ${email}`;

        document.getElementById('reg-success').classList.add('show');

        toast('Conta criada com sucesso!', 'success');

    } catch (err) {

        console.error(err);

        toast('Erro de conexão com servidor.', 'error');
    }

    btnLoad(
        'btn-register',
        false,
        'Criar conta',
        'fas fa-user-plus'
    );
}

/* ─────────────────────────────
   RESET
───────────────────────────── */
async function handleReset() {

    const email = document.getElementById('reset-email').value.trim();

    if (!email) {
        toast('Informe seu e-mail.', 'error');
        return;
    }

    btnLoad('btn-reset', true);

    try {

        await fetch(`${API}/forgot-password`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email })
        });

        document.getElementById('reset-form').style.display = 'none';

        document.getElementById('reset-success-msg').textContent =
            `Se ${email} existir, enviaremos o link.`;

        document.getElementById('reset-success').classList.add('show');

        toast('Verifique sua caixa de entrada.', 'success');

    } catch (err) {

        console.error(err);

        toast('Erro de conexão.', 'error');
    }

    btnLoad(
        'btn-reset',
        false,
        'Enviar link de recuperação',
        'fas fa-paper-plane'
    );
}

/* ─────────────────────────────
   ENTER KEY
───────────────────────────── */
document.addEventListener('keydown', e => {

    if (e.key !== 'Enter') return;

    const active = document.querySelector('.panel.active').id;

    if (active === 'panel-login') {
        handleLogin();
    }

    if (active === 'panel-register') {
        handleRegister();
    }

    if (active === 'panel-reset') {
        handleReset();
    }
});
</script>
